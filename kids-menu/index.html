<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | V's Viet Cafe</title>
    <meta name="description" content="Browse the V's Viet Cafe menu in Marsden, including Vietnamese dishes, banh mi, pho, rice dishes, breakfast and coffee.">
    <link rel="icon" href="../images/logo_transparent.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="subpage" data-page="category" data-category="kids-menu" data-depth="../">
    <nav class="nav">
        <div class="nav-inner">
            <a href="../" class="nav-logo">
                <img src="../images/logo_transparent.png" alt="V's Viet Cafe logo" class="nav-logo-img">
                <span>V's Viet <strong>Cafe</strong></span>
            </a>
            <div class="nav-actions">
                <button class="language-toggle" type="button" data-lang-toggle aria-label="Switch language">
                    <span data-lang-current>EN</span>
                    <i class="fa-solid fa-language"></i>
                </button>
                <a href="https://www.ubereats.com/au/store/vs-viet-cafe/b4be8e3c-da46-5a2c-8f47-e8144cba4feb" target="_blank" rel="noopener" class="nav-action nav-action--uber" aria-label="Order V's Viet Cafe on Uber Eats">
                    <img src="../images/ubereats.svg" alt="" class="nav-action-logo nav-action-logo--uber">
                </a>
                <a href="tel:+61410788999" class="nav-action nav-action--phone">
                    <i class="fa-solid fa-phone"></i>
                    <span data-i18n="nav.call">Call</span>
                </a>
            </div>
        </div>
    </nav>
    <main>
        <section class="category-hero">
            <div class="category-hero-content">
                <a href="../#menu" class="back-link"><i class="fa-solid fa-arrow-left"></i><span data-i18n="category.back">Back to menu</span></a>
                <h1 id="categoryTitle"></h1>
                <p id="categoryIntro"></p>
                <div class="category-meta">
                    <span class="category-count" id="categoryCount"></span>
                    <a class="btn btn-primary" id="categoryOrder" href="../order/"><span data-i18n="category.order">Start an online order</span><i class="fa-solid fa-arrow-right"></i></a>
                </div>
            </div>
        </section>
        <section class="listing-section"><div class="container listing-grid" id="categoryItems"></div></section>
    </main>
    <script src="../menu-data.js"></script>
    <script src="../site.js"></script>
</body>
</html>
