<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-order | Logan Reserve Bakehouse</title>
    <meta name="description" content="Pre-order pickup, bulk and catering requests from Logan Reserve Bakehouse.">
    <link rel="icon" href="../images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
</head>
<body data-page="order" data-depth="../">
    <nav class="nav">
        <div class="nav-inner">
            <a href="../" class="nav-logo">
                <img src="../images/favicon.png" alt="Logan Reserve Bakehouse Logo" class="nav-logo-img">
                <span>Logan Reserve <strong>Bakehouse</strong></span>
            </a>
            <div class="nav-links">
                <a href="../#menu" data-i18n="nav.menu">Menu</a>
                <a href="../#about" data-i18n="nav.about">About</a>
                <a href="../#location" data-i18n="nav.location">Location</a>
                <a href="../order/" class="nav-order" data-i18n="nav.order">Order</a>
            </div>
            <div class="nav-actions">
                <button class="language-toggle" type="button" data-lang-toggle aria-label="Switch language">
                    <span data-lang-current>EN</span>
                    <i class="fa-solid fa-language"></i>
                </button>
                <a href="tel:+61734167399" class="nav-action nav-action--phone">
                    <i class="fa-solid fa-phone"></i>
                    <span data-i18n="nav.call">Call</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="order-page">
        <div class="container order-layout">
            <div class="order-copy">
                <a href="../" class="back-link" style="background: var(--gold-dark); border-color: var(--gold-dark);">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span data-i18n="order.back">Back to home</span>
                </a>
                <p class="eyebrow" data-i18n="order.eyebrow">Pre-order</p>
                <h1 class="section-title" data-i18n="order.title">Order ahead for pickup</h1>
                <p class="section-lead" data-i18n="order.copy">Use this form to prepare a regular pickup order or a larger catering request. Submissions are parked for now until SMS is connected.</p>
            </div>

            <div class="order-card">
                <form class="order-form" id="orderForm">
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="customerName" data-i18n="order.name">Your name</label>
                            <input id="customerName" name="customerName" autocomplete="name" required>
                        </div>
                        <div class="form-field">
                            <label for="customerPhone" data-i18n="order.phone">Phone number</label>
                            <input id="customerPhone" name="customerPhone" type="tel" autocomplete="tel" required>
                        </div>
                        <div class="form-field">
                            <label for="orderType" data-i18n="order.type">Order type</label>
                            <select id="orderType" name="orderType">
                                <option data-i18n="order.typeRegular">Regular pickup</option>
                                <option data-i18n="order.typeCatering">Bulk / catering</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="quantity" data-i18n="order.quantity">Quantity</label>
                            <input id="quantity" name="quantity" type="number" min="1" value="1">
                        </div>
                        <div class="form-field form-field--full">
                            <label for="orderItem" data-i18n="order.item">Item or request</label>
                            <textarea id="orderItem" name="orderItem" required data-i18n-placeholder="order.placeholder" placeholder="e.g. 4 roasted pork banh mi, no chilli"></textarea>
                        </div>
                        <div class="form-field">
                            <label for="pickupDate" data-i18n="order.date">Pickup date</label>
                            <input id="pickupDate" name="pickupDate" type="date">
                        </div>
                        <div class="form-field">
                            <label for="pickupTime" data-i18n="order.pickup">Pickup time</label>
                            <input id="pickupTime" name="pickupTime" type="time">
                        </div>
                        <div class="form-field form-field--full">
                            <label for="orderNotes" data-i18n="order.notes">Notes</label>
                            <textarea id="orderNotes" name="orderNotes" data-i18n-placeholder="order.notesPlaceholder" placeholder="Allergies, slicing, catering details or preferred pickup notes"></textarea>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-lg" type="submit">
                        <span data-i18n="order.submit">Submit order</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                    <p class="order-message" id="orderMessage" hidden></p>
                </form>
            </div>
        </div>
    </main>

    <script src="../menu-data.js"></script>
    <script src="../site.js"></script>
</body>
</html>
